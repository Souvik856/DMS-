workflows:
  android-kotlin-workflow:
    name: Android Kotlin APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      android_sdk: latest
    triggering:
      events:
        - push
    scripts:
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/apk/**/*.apk
